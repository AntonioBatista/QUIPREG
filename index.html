<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEvAU-DB | TodoPAU v6</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
:root{--subject-color:#00c853;--subject-soft:rgba(0,200,83,.1)}
body{font-family:Inter,sans-serif;background:#f8f9fa;color:#1a1a1a;overflow:hidden}
.data-row{background:white;border-radius:16px;border:1px solid #eee;padding:2rem}
.problem-image{max-width:100%;border-radius:8px;margin:1rem 0;border:1px solid #eee}
.custom-scroll::-webkit-scrollbar{width:4px}
.custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
mark{background:#fff3a3;padding:1px 3px;border-radius:4px}
</style>
</head>

<body class="h-screen flex flex-col">

<header class="bg-white border-b p-4 flex justify-between">
<b>PEvAU-DB</b>
<button onclick="toggleExam()" class="bg-black text-white px-4 py-2 rounded">MODO EXAMEN (<span id="examCount">0</span>)</button>
</header>

<div class="flex flex-1 overflow-hidden">
<aside class="w-72 bg-white border-r p-6 flex flex-col gap-6 overflow-y-auto custom-scroll">
<input id="search" placeholder="Buscar..." class="border-b p-2">
<select id="topicSelect" class="border p-2 rounded"></select>
<select id="yearSelect" class="border p-2 rounded"></select>
<button onclick="resetFilters()" class="bg-gray-100 p-2 rounded">Limpiar</button>
</aside>

<main class="flex-1 overflow-y-auto p-8">
<div id="stats" class="text-xs text-gray-400 mb-6"></div>
<div id="questions" class="max-w-4xl mx-auto flex flex-col gap-6"></div>
</main>
</div>

<script>
// ========= CONFIG =========
const config={folder:"QUIM",file:"indexquim.json"};
const el={
search:document.getElementById('search'),
topic:document.getElementById('topicSelect'),
year:document.getElementById('yearSelect'),
stats:document.getElementById('stats'),
questions:document.getElementById('questions'),
examCount:document.getElementById('examCount')
};

let allQuestions=[];
let selectedIds=new Set();
let activeTag="all";

// ========= UTIL =========
function debounce(fn,d){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d)}}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function saveState(){localStorage.setItem("pau_state",JSON.stringify({topic:el.topic.value,year:el.year.value}))}
function loadState(){const s=JSON.parse(localStorage.getItem("pau_state"));if(s){el.topic.value=s.topic;el.year.value=s.year}}

// ========= TEXTO =========
function autoChem(t){return t.replace(/\b([A-Z][a-z]?\d+)+\b/g,f=>f.replace(/(\d+)/g,'<sub>$1</sub>'))}
function cleanText(t){
t=t.replace(/\\n/g,'\n')
t=t.replace(/\(\s*Z=\s*\n+\s*(\d+)\s*\)/g,'(Z=$1)')
t=t.replace(/\n{3,}/g,'\n\n')
return t
}
function highlight(t,term){if(!term)return t;const r=new RegExp(term,'gi');return t.replace(r,m=>`<mark>${m}</mark>`)}
function renderContent(q,term){
let text=highlight(autoChem(cleanText(q.text)),term)
return DOMPurify.sanitize(marked.parse(text))
}

// ========= RENDER =========
function render(){
const term=el.search.value.trim().toLowerCase()
const topic=el.topic.value
const year=el.year.value

const filtered=allQuestions.filter(q=>{
return (q.text||"").toLowerCase().includes(term)
&&(topic==='all'||q.topic_name===topic)
&&(year==='all'||q.exam_year==year)
})

el.stats.textContent=`${filtered.length} resultados`
const frag=document.createDocumentFragment()

filtered.forEach(q=>{
const card=document.createElement('div')
card.className='data-row'
card.innerHTML=`
<h2 class="font-bold text-xl mb-2">${q.exam_year} · ${q.exam_model||''}</h2>
<div class="prose">${renderContent(q,term)}</div>
<button onclick="toggleExamItem('${q.id}')" class="mt-4 border px-4 py-2 rounded">
${selectedIds.has(q.id)?'Quitar':'Seleccionar'}
</button>`
frag.appendChild(card)
})

el.questions.innerHTML=''
el.questions.appendChild(frag)
el.questions.scrollIntoView({behavior:'smooth'})
renderMathInElement(el.questions,{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}]})
saveState()
}

// ========= DATOS =========
async function loadData(){
const idx=await fetch(`${config.folder}/${config.file}`).then(r=>r.json())
const files=await Promise.all(idx.topics.map(t=>fetch(`${config.folder}/${t.file}`).then(r=>r.json())))
allQuestions=files.flat()

const topics=[...new Set(allQuestions.map(q=>q.topic_name))]
const years=[...new Set(allQuestions.map(q=>q.exam_year))].sort((a,b)=>b-a)

el.topic.innerHTML='<option value="all">Todos los bloques</option>'+topics.map(t=>`<option>${t}</option>`).join('')
el.year.innerHTML='<option value="all">Todos los años</option>'+years.map(y=>`<option>${y}</option>`).join('')
loadState()
render()
}

// ========= EXAMEN =========
function toggleExamItem(id){
selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id)
el.examCount.textContent=selectedIds.size
render()
}
function toggleExam(){alert("Modo examen en construcción")}

// ========= FILTROS =========
function resetFilters(){el.search.value='';el.topic.value='all';el.year.value='all';render()}

// ========= EVENTOS =========
el.search.oninput=debounce(render,250)
el.topic.onchange=render
el.year.onchange=render

// ========= INIT =========
document.addEventListener('DOMContentLoaded',loadData)
</script>
</body>
</html>
