<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banco de Preguntas</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
  
<style>
.prose strong{font-weight:bold;}
.prose{line-height:1.6}

:root{
  --color-bg:#E4E3E0;
  --color-ink:#141414;
  --color-line:#141414;
}
body{background:var(--color-bg);color:var(--color-ink);font-family:Inter,system-ui;}
.data-row{border-bottom:1px solid var(--color-line);transition:.2s}
.data-row:hover{background:var(--color-ink);color:var(--color-bg)}
.col-header{font-style:italic;font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.08em}
.data-value{font-family:monospace}
</style>
</head>

<body class="min-h-screen">

<header class="border-b p-6 bg-white/50 backdrop-blur">
  <h1 class="text-2xl italic font-serif">Banco de Preguntas</h1>
  <p class="text-xs uppercase tracking-widest opacity-50">Química · Acceso Público</p>
</header>

<main class="p-6 max-w-6xl mx-auto">

<div class="flex gap-4 mb-6">
  <select id="topicSelect" class="border px-4 py-2 rounded bg-white">
    <option value="all">Todos los temas</option>
  </select>
  <select id="yearSelect" class="border px-4 py-2 rounded bg-white">
  <option value="all">Todos los años</option>
  </select>

  <input id="search" placeholder="Buscar por texto..." class="border px-4 py-2 rounded flex-1 bg-white">
</div>

<div id="stats" class="mb-4 text-sm opacity-60"></div>

<div class="border rounded overflow-hidden bg-white/50">
  <div class="grid grid-cols-[120px_1fr_160px] p-4 bg-black text-white text-xs uppercase tracking-widest">
    <div>Año</div>
    <div>Enunciado</div>
    <div>Tema</div>
  </div>
  <div id="questions"></div>
</div>

</main>

<script>
let allQuestions=[];

async function loadData(){
  const index=await fetch('QUIM/indexquim.json').then(r=>r.json());
  const files=index.topics.map(t=>'QUIM/'+t.file);
  
  for(const f of files){
    const qs=await fetch(f).then(r=>r.json());
    allQuestions.push(...qs);
  }
  
  populateTopics();
  render();
}

function populateTopics(){
  const sel=document.getElementById('topicSelect');
  const topics=[...new Set(allQuestions.map(q=>q.topic_name))];
  topics.forEach(t=>{
    const o=document.createElement('option');
    o.value=t;o.textContent=t;sel.appendChild(o);
  });
}

function getQuestionType(text){
  const t=text.toLowerCase();

  const teoria=/justifique|razone|explique|indique|ordene|defina/.test(t);
  const problema=/calcule|determine|ajuste|halle|obtenga|cuantifique/.test(t);

  if(problema) return {label:'Problema',color:'bg-blue-100 text-blue-800'};
  if(teoria) return {label:'Teoría',color:'bg-emerald-100 text-emerald-800'};
  return {label:'Mixto',color:'bg-gray-100 text-gray-800'};
}
  
function render(){
  const year=document.getElementById('yearSelect').value;
  const term=document.getElementById('search').value.toLowerCase();
  const topic=document.getElementById('topicSelect').value;
  const type=getQuestionType(q.text);
  
  const filtered=allQuestions.filter(q=>{
  const okText=q.text.toLowerCase().includes(term);
  const okTopic=topic==='all'||q.topic_name===topic;
  const okYear=year==='all'||q.exam_year==year;
  return okText && okTopic && okYear;
});

  populateTopics();
  populateYears();
  render();

  function populateYears(){
  const sel=document.getElementById('yearSelect');
  const years=[...new Set(allQuestions.map(q=>q.exam_year))].sort((a,b)=>b-a);
  years.forEach(y=>{
    const o=document.createElement('option');
    o.value=y;
    o.textContent=y;
    sel.appendChild(o);
  });
}

  document.getElementById('stats').textContent=
    `${filtered.length} preguntas encontradas`;

  const container=document.getElementById('questions');
  container.innerHTML='';

  filtered.forEach(q=>{
    const row=document.createElement('div');
    row.className='data-row grid grid-cols-[120px_1fr_160px] p-4 gap-4';
    row.innerHTML=`
  <div class="data-value">${q.exam_year}</div>
  <div class="prose">${formatChemistry ? formatChemistry(marked.parse(q.text)) : marked.parse(q.text)}</div>
  <div class="flex flex-col gap-2">
    <span class="text-xs opacity-70">${q.topic_name}</span>
    <span class="px-2 py-1 rounded text-xs font-semibold ${type.color}">
      ${type.label}
    </span>
  </div>
`;
    container.appendChild(row);
  });
  renderMathInElement(container, {
  delimiters: [
    {left: "$", right: "$", display: false},
    {left: "$$", right: "$$", display: true}
  ],
  trust: true,
  macros: {
    "\\ce": "\\ce"
  }
});
}

document.getElementById('search').oninput=render;
document.getElementById('topicSelect').onchange=render;
document.getElementById('yearSelect').onchange=render;
  
setTimeout(() => {
  renderMathInElement(document.body, {
    delimiters: [
      {left: "$", right: "$", display: false},
      {left: "$$", right: "$$", display: true}
    ]
  });
}, 100);
loadData();
</script>

</body>
</html>
